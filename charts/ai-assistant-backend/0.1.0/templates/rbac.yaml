apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-assistant-readonly
rules:
  # Pod status, conditions, metadata
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]

  # Pod logs (read-only stream)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Events (critical for troubleshooting)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # Core resources — read-only
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - nodes
      - nodes/status
      - namespaces
      - resourcequotas
      - limitranges
      - persistentvolumeclaims
      - configmaps
    verbs: ["get", "list", "watch"]

  # Workload controllers — read-only
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]

  # Jobs & CronJobs — read-only
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]

  # Ingress / networking — read-only
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]

  # HPA — read-only
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]

  # CRDs metadata (useful for identifying custom workloads)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]

  # ============================================
  # EXPLICITLY EXCLUDED (not listed = no access):
  # - secrets
  # - serviceaccounts/token
  # - any write verbs (create, update, patch, delete)
  # - rbac.authorization.k8s.io/*
  # - admissionregistration.k8s.io/*
  # ============================================
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-assistant-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-assistant-readonly
subjects:
  - kind: ServiceAccount
    name: ai-assistant
    namespace: {{ .Values.namespace }}
