image:
  repository: ghcr.io/atroo/ai-assistant-backend
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []  # e.g., [{ name: my-registry-secret }]

replicaCount: 1

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  apiKeySecretName: ai-assistant-llm-key
  apiKeySecretKey: api-key

embedding:
  # OpenAI-compatible embedding API (Voyage AI, OpenAI, Ollama, etc.)
  baseUrl: https://api.voyageai.com/v1
  model: voyage-3-lite
  dimensions: 512
  # Set apiKeySecretName to enable semantic search for long-term memory
  apiKeySecretName: ""  # e.g., ai-assistant-embedding-key
  apiKeySecretKey: api-key

# Datasources — each category has a provider and provider-specific config.
# Set provider to "" to disable that category.
datasources:
  logs:
    provider: kubernetes  # built-in, uses K8s API (no extra config)
  metrics:
    provider: prometheus  # "prometheus" or "" to disable
    prometheus:
      url: http://rancher-monitoring-prometheus.cattle-monitoring-system:9090
  traces:
    provider: ""  # "tempo" or "" to disable
    tempo:
      url: http://tempo-query-frontend.cattle-monitoring-system:3200

service:
  port: 8080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""  # use default storage class

rbac:
  create: true

namespace: cattle-ai-assistant
