apiVersion: v1
kind: Service
metadata:
  name: ai-assistant-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-assistant-backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: ai-assistant-backend
